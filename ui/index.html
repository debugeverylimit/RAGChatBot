<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HDFC Mutual Fund FAQ Assistant</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="header-top">
          <div class="brand">
            <div class="logo" aria-hidden="true">MF</div>
            <div>
              <h1 class="title">HDFC Mutual Fund FAQ Assistant</h1>
              <p class="subtitle">Facts-only answers from 15 Groww scheme pages</p>
            </div>
          </div>
          <div class="disclaimer">Facts-only. No investment advice.</div>
        </div>
        <p class="welcome">
          Ask objective questions about expense ratio, exit load, minimum SIP, benchmark,
          or fund manager details. I answer only from indexed HDFC scheme sources.
        </p>
        <details class="scheme-panel" id="scheme-panel">
          <summary class="scheme-summary">
            <span id="scheme-summary-label">15 supported HDFC schemes</span>
            <span class="scheme-summary-hint" aria-hidden="true"></span>
          </summary>
          <div id="scheme-list" class="scheme-grid" aria-label="Supported schemes"></div>
        </details>
      </header>

      <section class="chat-shell" aria-label="Chat">
        <div id="messages" class="messages" aria-live="polite"></div>
        <div id="examples" class="examples" aria-label="Example questions"></div>
        <form id="chat-form" class="composer">
          <input
            id="chat-input"
            type="text"
            maxlength="1000"
            autocomplete="off"
            placeholder="Ask a factual question about one supported HDFC scheme"
            aria-label="Your question"
          />
          <button id="send-btn" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
