services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      CHROMA_HOST: http://chroma:8000
    volumes:
      - ./data:/app/data
    depends_on:
      - chroma

volumes:
  chroma_data:
